<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance | B&M Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
  <body class="bg-slate-900 flex items-center justify-center min-h-screen p-12">
    <div class="bg-white p-2 md:p-2 rounded-xl shadow-2xl max-w-lg w-full text-center">
  <style>
    /* Smooth background animation */
    body {
      background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #0f172a);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
<div class="flex items-center justify-center mb-1">
  <img src="maintenance_image.png" alt="maintenance" class="w-18 h-18 animate-pulse">
</div>
<!-- Description -->
<p class="text-black-300 mb-6 leading-relaxed">
  The <span class="text-blue-400 font-semibold">B&M Group Portal</span> is currently under maintenance. We are working hard to improve your experience and will be back online shortly.
</p>
<!-- Status badge -->
<div class="inline-flex items-center gap-2 bg-gray-500/20 text-red-600 px-4 py-2 rounded-full text-sm mb-6">
  <span class="w-2 h-2 bg-red-400 rounded-full animate-ping"></span>
  Maintenance in progress
</div>
</body>
</html>
